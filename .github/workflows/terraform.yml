name: Terraform CI/CD

on:
  push:
    branches:
      - main        # runs on every push to main
  pull_request:
    branches:
      - main        # runs on every PR to main

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest   # runs on GitHub's servers

    steps:
      # Step 1 - Checkout your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Install Terraform on GitHub's server
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      # Step 3 - Configure AWS credentials
      # These come from GitHub Secrets — not hardcoded
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # Step 4 - Init
      - name: Terraform Init
        run: terraform init
        working-directory: environments/prod

      # Step 5 - Plan on every PR
      # Shows what will change before merging
      - name: Terraform Plan
        run: terraform plan
        working-directory: environments/prod

      # Step 6 - Apply only when merged to main
      # Not on PRs — only actual merges
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: environments/prod